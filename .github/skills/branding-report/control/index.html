<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Bloom Branding Viewer</title>
        <style>
            :root {
                color-scheme: light dark;
                --ground: #faf8f6;
                --panel: #fff;
                --ink: #23201e;
                --muted: #6b645f;
                --hairline: #e7e0d9;
                --accent: #d65649;
                --accent-soft: #f5ddd8;
                --page-surround: #ece8e3;
                --bad: #c0392b;
                --bad-soft: #fbeae7;
                --queued: #b8891f;
                --queued-soft: #f6ecd4;
                --run: #2f7d55;
                --run-soft: #dcefe2;
                --sidebar-w: 290px;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --ground: #1a1817;
                    --panel: #232019;
                    --ink: #ece7e2;
                    --muted: #a59d95;
                    --hairline: #38332e;
                    --accent: #e8776b;
                    --accent-soft: #3a2622;
                    --page-surround: #0f0e0d;
                    --bad: #e8776b;
                    --bad-soft: #3a2622;
                    --queued: #e0b552;
                    --queued-soft: #332a17;
                    --run: #79c79b;
                    --run-soft: #1c2c22;
                }
            }
            :root[data-theme="dark"] {
                --ground: #1a1817;
                --panel: #232019;
                --ink: #ece7e2;
                --muted: #a59d95;
                --hairline: #38332e;
                --accent: #e8776b;
                --accent-soft: #3a2622;
                --page-surround: #0f0e0d;
                --bad: #e8776b;
                --bad-soft: #3a2622;
                --queued: #e0b552;
                --queued-soft: #332a17;
                --run: #79c79b;
                --run-soft: #1c2c22;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                height: 100%;
                background: var(--ground);
                color: var(--ink);
                font-family:
                    "Segoe UI",
                    system-ui,
                    -apple-system,
                    Roboto,
                    sans-serif;
                font-size: 14px;
            }
            body {
                display: grid;
                grid-template-columns: var(--sidebar-w) 1fr;
                grid-template-rows: auto 1fr;
                height: 100vh;
            }

            /* header spans both columns */
            header {
                grid-column: 1 / 3;
                display: flex;
                align-items: center;
                gap: 16px;
                flex-wrap: wrap;
                padding: 12px 20px;
                border-bottom: 1px solid var(--hairline);
                background: var(--panel);
            }
            header h1 {
                margin: 0;
                font-size: 1.05rem;
                font-weight: 700;
                letter-spacing: 0.01em;
            }
            header .sub {
                color: var(--muted);
                font-size: 0.8rem;
            }
            .spacer {
                flex: 1;
            }
            .status {
                display: flex;
                align-items: center;
                gap: 9px;
                font-size: 0.82rem;
                color: var(--muted);
            }
            .dot {
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background: var(--muted);
                flex: none;
            }
            .dot.busy {
                background: var(--run);
                animation: pulse 1s ease-in-out infinite;
            }
            .dot.idle {
                background: var(--hairline);
            }
            .dot.err {
                background: var(--bad);
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.35;
                }
            }

            /* dropdown menus (layouts/pages) */
            .menu {
                position: relative;
            }
            .menu > summary {
                list-style: none;
                cursor: pointer;
                padding: 6px 12px;
                border: 1px solid var(--hairline);
                border-radius: 8px;
                background: var(--panel);
                color: var(--ink);
                font-size: 0.82rem;
                user-select: none;
                white-space: nowrap;
            }
            .menu > summary::-webkit-details-marker {
                display: none;
            }
            .menu > summary::after {
                content: " ▾";
                color: var(--muted);
            }
            .menu[open] > summary {
                border-color: var(--accent);
            }
            .menu .pop {
                position: absolute;
                top: calc(100% + 5px);
                left: 0;
                z-index: 30;
                min-width: 200px;
                max-height: 340px;
                overflow: auto;
                background: var(--panel);
                border: 1px solid var(--hairline);
                border-radius: 10px;
                padding: 8px;
                box-shadow: 0 12px 34px -12px rgba(0, 0, 0, 0.4);
            }
            .menu .pop label {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 5px 6px;
                border-radius: 6px;
                cursor: pointer;
                white-space: nowrap;
            }
            .menu .pop label:hover {
                background: var(--accent-soft);
            }
            .seg {
                display: inline-flex;
                border: 1px solid var(--hairline);
                border-radius: 8px;
                overflow: hidden;
            }
            .seg button {
                font: inherit;
                font-size: 0.82rem;
                border: 0;
                background: var(--panel);
                color: var(--muted);
                padding: 6px 12px;
                cursor: pointer;
            }
            .seg button.on {
                background: var(--accent);
                color: #fff;
            }
            .hbtn {
                font: inherit;
                font-size: 0.82rem;
                padding: 6px 14px;
                border: 1px solid var(--accent);
                border-radius: 8px;
                background: var(--accent);
                color: #fff;
                cursor: pointer;
                white-space: nowrap;
            }
            .hbtn:disabled {
                opacity: 0.45;
                cursor: default;
            }
            .hbtn.secondary {
                background: var(--panel);
                color: var(--ink);
                border-color: var(--hairline);
            }
            .hbtn.secondary:not(:disabled):hover {
                border-color: var(--accent);
                color: var(--accent);
            }
            .hbtn.icon {
                font-size: 1.1rem;
                line-height: 1;
                padding: 5px 11px;
            }

            /* sidebar */
            aside {
                grid-row: 2;
                overflow: auto;
                border-right: 1px solid var(--hairline);
                background: var(--panel);
                padding: 12px 0;
            }
            aside .side-h {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 0 14px 8px;
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.11em;
                color: var(--accent);
                font-weight: 700;
            }
            aside .side-h .count {
                color: var(--muted);
                font-weight: 600;
                letter-spacing: 0;
                text-transform: none;
            }
            .search {
                margin: 0 12px 10px;
                width: calc(100% - 24px);
                padding: 7px 10px;
                border: 1px solid var(--hairline);
                border-radius: 8px;
                background: var(--ground);
                color: var(--ink);
                font: inherit;
                font-size: 0.82rem;
            }
            .bulk {
                display: flex;
                gap: 6px;
                padding: 0 12px 10px;
            }
            .bulk button {
                flex: 1;
                font: inherit;
                font-size: 0.76rem;
                padding: 5px;
                border: 1px solid var(--hairline);
                border-radius: 7px;
                background: var(--ground);
                color: var(--muted);
                cursor: pointer;
            }
            .bulk button:hover {
                border-color: var(--accent);
                color: var(--ink);
            }
            .brow {
                display: flex;
                align-items: center;
                gap: 9px;
                padding: 6px 14px;
                cursor: pointer;
                border-left: 3px solid transparent;
            }
            .brow:hover {
                background: var(--accent-soft);
            }
            .brow.on {
                border-left-color: var(--accent);
            }
            .brow input {
                flex: none;
                cursor: pointer;
            }
            .brow .nm {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .brow.on .nm {
                font-weight: 600;
            }
            .brow.special .nm {
                font-weight: 700;
            }
            .badge {
                flex: none;
                font-size: 0.68rem;
                padding: 1px 7px;
                border-radius: 20px;
                font-weight: 600;
            }
            .badge.done {
                background: var(--run-soft);
                color: var(--run);
            }
            .badge.queued {
                background: var(--queued-soft);
                color: var(--queued);
            }
            .badge.run {
                background: var(--run-soft);
                color: var(--run);
            }
            .badge.err {
                background: var(--bad-soft);
                color: var(--bad);
            }

            /* main */
            main {
                grid-row: 2;
                overflow: auto;
                padding: 18px 22px 70px;
                --cell-w: 190px;
                --cell-h: 150px;
            }
            .layout-sec {
                margin-bottom: 32px;
            }
            .layout-sec h2 {
                margin: 0 0 12px;
                font-size: 0.95rem;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .layout-sec h2 .tag {
                font-size: 0.66rem;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--muted);
                border: 1px solid var(--hairline);
                border-radius: 20px;
                padding: 2px 9px;
            }
            .brand-head {
                font-size: 1.18rem;
                font-weight: 800;
                color: var(--ink);
                letter-spacing: -0.01em;
                padding: 10px 2px 3px;
            }
            .wrap-row {
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
                margin: 2px 0 20px;
            }
            .wrap-item {
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 5px;
            }
            .wrap-item figcaption {
                font-size: 0.76rem;
                color: var(--muted);
                text-align: center;
                max-width: var(--cell-w, 190px);
            }
            .wrap-item figcaption b {
                color: var(--ink);
            }
            table {
                border-collapse: separate;
                border-spacing: 10px;
            }
            th {
                font-size: 0.74rem;
                font-weight: 600;
                color: var(--muted);
                text-align: center;
                padding: 2px 4px;
                vertical-align: bottom;
            }
            th.rowhead {
                text-align: right;
                white-space: nowrap;
                max-width: 170px;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            td {
                vertical-align: top;
            }
            .cell {
                width: var(--cell-w, 190px);
                height: var(--cell-h, 150px);
                border: 1px solid var(--hairline);
                border-radius: 6px;
                overflow: hidden;
                background: var(--page-surround);
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
            }
            .cell img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                display: block;
                cursor: zoom-in;
            }
            .cell .state {
                font-size: 0.74rem;
                text-align: center;
                padding: 8px;
                color: var(--muted);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .cell.bad {
                background: var(--bad-soft);
            }
            .cell.bad .state {
                color: var(--bad);
            }
            .cell.marked {
                outline: 3px solid var(--accent);
                outline-offset: -3px;
            }
            .cellwrap {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 5px;
            }
            .mark {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-size: 0.72rem;
                color: var(--muted);
                cursor: pointer;
                user-select: none;
            }
            .mark input {
                cursor: pointer;
                margin: 0;
            }
            .spin {
                width: 20px;
                height: 20px;
                border: 2.5px solid var(--hairline);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .empty {
                color: var(--muted);
                padding: 60px 20px;
                text-align: center;
                max-width: 520px;
                line-height: 1.6;
            }
            .empty b {
                color: var(--ink);
            }

            /* overlay */
            #overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.85);
                display: none;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 12px;
                z-index: 60;
                padding: 24px;
            }
            #overlay img {
                max-width: 94vw;
                max-height: 82vh;
                object-fit: contain;
                background: var(--page-surround);
                border-radius: 6px;
            }
            #overlay .meta {
                color: #eee;
                font-size: 0.85rem;
                text-align: center;
            }
            #overlay .close {
                position: absolute;
                top: 16px;
                right: 22px;
                color: #fff;
                font-size: 1.7rem;
                cursor: pointer;
                line-height: 1;
            }
            .pill {
                display: inline-block;
                background: rgba(255, 255, 255, 0.14);
                color: #fff;
                border-radius: 20px;
                padding: 2px 10px;
                font-size: 0.74rem;
                margin: 0 3px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Bloom Branding Viewer</h1>
            <div class="spacer"></div>
            <details class="menu" id="layoutMenu">
                <summary>Layouts</summary>
                <div class="pop" id="layoutPop"></div>
            </details>
            <details class="menu" id="pageMenu">
                <summary>Pages</summary>
                <div class="pop" id="pagePop"></div>
            </details>
            <div class="seg" id="viewSeg">
                <button data-v="matrix" class="on">Matrix</button>
                <button data-v="wrap">Wrap</button>
            </div>
            <button
                id="refreshBtn"
                class="hbtn secondary icon"
                title="Discard all screenshots and rebuild the current selection"
            >
                ↻
            </button>
            <button id="pdfBtn" class="hbtn">Save PDF</button>
            <button id="copyMarkedBtn" class="hbtn secondary" disabled>
                Copy Marked
            </button>
            <button id="clearMarkedBtn" class="hbtn secondary" disabled>
                Clear Marked
            </button>
            <div class="status">
                <span class="dot idle" id="dot"></span
                ><span id="statusText">idle</span>
            </div>
        </header>

        <aside>
            <div class="side-h">Brandings</div>
            <input class="search" id="search" placeholder="filter brandings…" />
            <div class="bulk">
                <button id="selAll">Check All</button>
                <button id="selNone">Uncheck all</button>
            </div>
            <div id="brandingList"></div>
        </aside>

        <main id="main"></main>

        <div id="overlay">
            <div class="close" onclick="closeOverlay()">×</div>
            <img id="overlayImg" alt="" />
            <div class="meta" id="overlayMeta"></div>
        </div>

        <script>
            const PAGE_ORDER = [
                "front",
                "insideFront",
                "title",
                "credits",
                "content",
                "insideBack",
                "back",
            ];
            let S = null; // latest server snapshot
            let lastVersion = -1;
            let view = "matrix";
            let searchText = "";
            // local optimistic copy of selections so the UI feels instant
            const sel = {
                brandings: new Set(),
                layouts: new Set(),
                pages: new Set(),
            };
            let selInit = false;
            // "Mark" set: key -> {branding,page,layout}; client-only, for Copy Marked.
            const marked = new Map();
            const markKey = (b, l, p) => `${b}|${l}|${p}`;
            function updateMarkUI() {
                const n = marked.size;
                const copy = document.getElementById("copyMarkedBtn"),
                    clr = document.getElementById("clearMarkedBtn");
                if (copy) {
                    copy.textContent = `Copy Marked${n ? ` (${n})` : ""}`;
                    copy.disabled = !n;
                }
                if (clr) clr.disabled = !n;
            }

            async function poll() {
                try {
                    const s = await (await fetch("/api/state")).json();
                    S = s;
                    if (!selInit && s.sessionReady) {
                        // adopt server defaults once (pages=all, layouts=current)
                        sel.pages = new Set(s.selection.pages);
                        sel.layouts = new Set(s.selection.layouts);
                        selInit = true;
                    }
                    if (s.version !== lastVersion) {
                        lastVersion = s.version;
                        renderAll();
                    } else {
                        updateStatus();
                    } // cheap refresh of status/badges only
                } catch (e) {
                    /* server not up yet */
                }
                setTimeout(poll, 900);
            }

            function postSelection() {
                fetch("/api/selection", {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        brandings: [...sel.brandings],
                        layouts: [...sel.layouts],
                        pages: [...sel.pages],
                    }),
                })
                    .then((r) => r.json())
                    .then((s) => {
                        S = s;
                        lastVersion = s.version;
                        renderAll();
                    });
            }

            function renderAll() {
                if (!S) return;
                renderLayoutMenu();
                renderPageMenu();
                renderBrandingList();
                renderMain();
                updateStatus();
            }

            /* ---- header menus ---- */
            function renderLayoutMenu() {
                const pop = document.getElementById("layoutPop");
                pop.innerHTML = "";
                S.model.layouts.forEach((l) => {
                    const lab = document.createElement("label");
                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.checked = sel.layouts.has(l);
                    cb.onchange = () => {
                        cb.checked ? sel.layouts.add(l) : sel.layouts.delete(l);
                        if (sel.layouts.size === 0 && S.model.currentLayout)
                            sel.layouts.add(S.model.currentLayout);
                        postSelection();
                    };
                    lab.appendChild(cb);
                    lab.appendChild(
                        document.createTextNode(
                            l +
                                (l === S.model.currentLayout
                                    ? "  (current)"
                                    : ""),
                        ),
                    );
                    pop.appendChild(lab);
                });
            }
            function renderPageMenu() {
                const pop = document.getElementById("pagePop");
                pop.innerHTML = "";
                const ordered = S.model.pages
                    .slice()
                    .sort(
                        (a, b) =>
                            PAGE_ORDER.indexOf(a.key) -
                            PAGE_ORDER.indexOf(b.key),
                    );
                ordered.forEach((p) => {
                    const lab = document.createElement("label");
                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.checked = sel.pages.has(p.key);
                    cb.onchange = () => {
                        cb.checked
                            ? sel.pages.add(p.key)
                            : sel.pages.delete(p.key);
                        postSelection();
                    };
                    lab.appendChild(cb);
                    lab.appendChild(document.createTextNode(p.label));
                    pop.appendChild(lab);
                });
            }

            /* ---- sidebar ---- */
            function brandingStatus(b) {
                const layouts = [...sel.layouts];
                const pages = [...sel.pages];
                if (!layouts.length || !pages.length) return null;
                let done = 0,
                    total = layouts.length * pages.length,
                    anyErr = false;
                for (const l of layouts)
                    for (const p of pages) {
                        if (p === "content") {
                            const cc = (S.cells || []).filter(
                                (c) =>
                                    c.branding === b &&
                                    (c.layout || "current") === l &&
                                    /^content(-\d+)?$/.test(c.page),
                            );
                            if (cc.length) {
                                done++;
                                if (cc.some((c) => !c.ok)) anyErr = true;
                            }
                        } else {
                            const c = cellFor(b, l, p);
                            if (c) {
                                done++;
                                if (!c.ok) anyErr = true;
                            }
                        }
                    }
                const isRun =
                    S.running &&
                    S.running.branding === b &&
                    sel.layouts.has(S.running.layout);
                const isQueued = S.queue.some((j) => j.branding === b);
                if (isRun) return { cls: "run", txt: "rendering" };
                if (done >= total && total > 0)
                    return {
                        cls: anyErr ? "err" : "done",
                        txt: anyErr ? "partial" : "✓",
                    };
                if (isQueued) return { cls: "queued", txt: "queued" };
                if (done > 0) return { cls: "queued", txt: `${done}/${total}` };
                return null;
            }
            function renderBrandingList() {
                const list = document.getElementById("brandingList");
                list.innerHTML = "";
                const q = searchText.toLowerCase();
                const shown = S.model.brandings.filter(
                    (b) => !q || b.toLowerCase().includes(q),
                );
                const special = new Set(["Default", "Local-Community"]); // the two core concepts: badge+QR & publisher
                shown.forEach((b) => {
                    const row = document.createElement("div");
                    row.className =
                        "brow" +
                        (sel.brandings.has(b) ? " on" : "") +
                        (special.has(b) ? " special" : "");
                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.checked = sel.brandings.has(b);
                    const toggle = () => {
                        sel.brandings.has(b)
                            ? sel.brandings.delete(b)
                            : sel.brandings.add(b);
                        postSelection();
                    };
                    cb.onchange = toggle;
                    row.onclick = (e) => {
                        if (e.target !== cb) {
                            cb.checked = !cb.checked;
                            toggle();
                        }
                    };
                    const nm = document.createElement("span");
                    nm.className = "nm";
                    nm.textContent = b;
                    nm.title = b;
                    row.appendChild(cb);
                    row.appendChild(nm);
                    const st = brandingStatus(b);
                    if (st) {
                        const bd = document.createElement("span");
                        bd.className = "badge " + st.cls;
                        bd.textContent = st.txt;
                        row.appendChild(bd);
                    }
                    list.appendChild(row);
                });
            }

            /* ---- main matrix ---- */
            function cellFor(b, l, p) {
                return (S.cells || []).find(
                    (c) =>
                        c.branding === b &&
                        (c.layout || "current") === l &&
                        c.page === p,
                );
            }
            const CONTENT_RE = /^content(-\d+)?$/;
            function contentNum(p) {
                const m = /^content-(\d+)$/.exec(p);
                return m ? +m[1] : 0;
            }
            // Expand the selected pages into the actual page columns to show for (layout l, brandings):
            // "content" becomes every captured content-* page (content-1, content-2, …); if none captured
            // yet, a single "content" placeholder is shown so it can render as pending/absent.
            function expandPages(l, brandings, selPages) {
                const out = [];
                for (const p of selPages) {
                    if (p === "content") {
                        const set = new Set();
                        (S.cells || []).forEach((c) => {
                            if (
                                (c.layout || "current") === l &&
                                brandings.includes(c.branding) &&
                                CONTENT_RE.test(c.page)
                            )
                                set.add(c.page);
                        });
                        let arr = [...set];
                        if (!arr.length) arr = ["content"];
                        arr.sort((a, b) => contentNum(a) - contentNum(b));
                        out.push(...arr);
                    } else out.push(p);
                }
                return out;
            }
            function labelFor(p) {
                const m = (S.model.pages || []).find((x) => x.key === p);
                return m ? m.label : p;
            }
            function pageLabelOf(p) {
                const c = (S.cells || []).find(
                    (x) => x.page === p && x.pageLabel,
                );
                if (c) return c.pageLabel;
                if (p === "content") return "Content pages";
                return labelFor(p);
            }

            function renderMain() {
                const m = document.getElementById("main");
                m.innerHTML = "";
                const brandings = [...sel.brandings];
                const layouts = [...sel.layouts];
                const selPages = PAGE_ORDER.filter((p) => sel.pages.has(p));
                if (!brandings.length) {
                    m.innerHTML =
                        '<div class="empty">Check one or more <b>brandings</b> on the left to render them.<br>' +
                        "They queue and appear here as each finishes. <b>Layouts</b> and <b>Pages</b> (top-right) apply to all brandings — " +
                        "turning a new one on re-renders the checked brandings to fill it in.</div>";
                    return;
                }
                if (!layouts.length || !selPages.length) {
                    m.innerHTML =
                        '<div class="empty">Select at least one <b>layout</b> and one <b>page</b> (top-right menus).</div>';
                    return;
                }
                if (view === "matrix") {
                    // Matrix: one section per layout; within it, page columns and a prominent
                    // full-width branding heading above each branding's row of cells.
                    for (const l of layouts) {
                        const sec = document.createElement("section");
                        sec.className = "layout-sec";
                        const h = document.createElement("h2");
                        h.textContent = l;
                        sec.appendChild(h);
                        sec.appendChild(
                            matrixTable(
                                brandings,
                                l,
                                expandPages(l, brandings, selPages),
                            ),
                        );
                        m.appendChild(sec);
                    }
                } else {
                    // Wrap: group ONLY by branding. All the branding's cells (every selected layout ×
                    // page) flow across the row and wrap; the break is between brandings.
                    const multiLayout = layouts.length > 1;
                    for (const b of brandings) {
                        const bh = document.createElement("div");
                        bh.className = "brand-head";
                        bh.textContent = b;
                        m.appendChild(bh);
                        const row = document.createElement("div");
                        row.className = "wrap-row";
                        for (const l of layouts)
                            for (const p of expandPages(l, [b], selPages)) {
                                const item = document.createElement("figure");
                                item.className = "wrap-item";
                                const cell = cellNode(b, l, p);
                                item.appendChild(cell);
                                const cap =
                                    document.createElement("figcaption");
                                if (multiLayout) {
                                    const bl = document.createElement("b");
                                    bl.textContent = l;
                                    cap.appendChild(bl);
                                    cap.appendChild(
                                        document.createTextNode(
                                            " · " + pageLabelOf(p),
                                        ),
                                    );
                                } else cap.textContent = pageLabelOf(p);
                                item.appendChild(cap);
                                // Mark goes LAST (after the caption).
                                const mk = markControl(b, l, p, cell);
                                if (mk) item.appendChild(mk);
                                row.appendChild(item);
                            }
                        m.appendChild(row);
                    }
                }
            }
            // Matrix: page labels across the top, then for each branding a prominent full-width
            // heading row followed by that branding's row of page cells.
            function matrixTable(brandings, l, pages) {
                const table = document.createElement("table");
                const head = table.insertRow();
                pages.forEach((p) => {
                    const th = document.createElement("th");
                    th.textContent = pageLabelOf(p);
                    head.appendChild(th);
                });
                brandings.forEach((b) => {
                    const hr = table.insertRow();
                    const htd = hr.insertCell();
                    htd.colSpan = pages.length;
                    const bh = document.createElement("div");
                    bh.className = "brand-head";
                    bh.textContent = b;
                    htd.appendChild(bh);
                    const tr = table.insertRow();
                    pages.forEach((p) => {
                        const td = tr.insertCell();
                        const cell = cellNode(b, l, p);
                        const mk = markControl(b, l, p, cell);
                        if (mk) {
                            const w = document.createElement("div");
                            w.className = "cellwrap";
                            w.appendChild(cell);
                            w.appendChild(mk);
                            td.appendChild(w);
                        } else td.appendChild(cell);
                    });
                });
                return table;
            }

            // The image cell only (no Mark control). Callers add markControl() where they
            // want it (under the image in Matrix; after the caption in Wrap).
            function cellNode(b, l, p) {
                const d = document.createElement("div");
                d.className = "cell";
                const c = cellFor(b, l, p);
                if (c && c.ok && c.file) {
                    const img = document.createElement("img");
                    img.loading = "lazy";
                    img.src = "/" + c.file + "?v=" + lastVersion;
                    img.alt = `${b} ${l} ${p}`;
                    img.onclick = () => openOverlay(c, b, l, p);
                    d.appendChild(img);
                    if (marked.has(markKey(b, l, p))) d.classList.add("marked");
                } else if (c && !c.ok) {
                    d.className += " bad";
                    const s = document.createElement("div");
                    s.className = "state";
                    s.textContent = c.error || "not present";
                    d.appendChild(s);
                } else {
                    const running =
                        S.running &&
                        S.running.branding === b &&
                        S.running.layout === l;
                    const queued = S.queue.some(
                        (j) => j.branding === b && j.layout === l,
                    );
                    const s = document.createElement("div");
                    s.className = "state";
                    if (running) {
                        const sp = document.createElement("div");
                        sp.className = "spin";
                        s.appendChild(sp);
                        s.appendChild(document.createTextNode("rendering…"));
                    } else if (queued) s.textContent = "queued";
                    else s.textContent = "—";
                    d.appendChild(s);
                }
                return d;
            }

            // The "Mark" checkbox for a captured cell; returns null if the cell has no image.
            // cellDiv is the .cell element so toggling reflects the accent outline.
            function markControl(b, l, p, cellDiv) {
                const c = cellFor(b, l, p);
                if (!(c && c.ok && c.file)) return null;
                const key = markKey(b, l, p);
                const mk = document.createElement("label");
                mk.className = "mark";
                const mcb = document.createElement("input");
                mcb.type = "checkbox";
                mcb.checked = marked.has(key);
                mcb.onchange = () => {
                    if (mcb.checked)
                        marked.set(key, { branding: b, page: p, layout: l });
                    else marked.delete(key);
                    if (cellDiv)
                        cellDiv.classList.toggle("marked", mcb.checked);
                    updateMarkUI();
                };
                mk.appendChild(mcb);
                mk.appendChild(document.createTextNode("Mark"));
                return mk;
            }

            /* ---- status ---- */
            function updateStatus() {
                if (!S) return;
                const dot = document.getElementById("dot"),
                    txt = document.getElementById("statusText");
                dot.className = "dot";
                if (S.lastError && !S.running) {
                    dot.classList.add("err");
                    txt.textContent = S.lastError.slice(0, 80);
                    return;
                }
                if (S.running) {
                    dot.classList.add("busy");
                    txt.textContent =
                        `rendering ${S.running.branding} / ${S.running.layout}` +
                        (S.queueLength ? ` · ${S.queueLength} queued` : "");
                } else if (S.queueLength) {
                    dot.classList.add("busy");
                    txt.textContent = `${S.queueLength} queued`;
                } else if (!S.sessionReady) {
                    dot.classList.add("busy");
                    txt.textContent = "warming up…";
                } else {
                    dot.classList.add("idle");
                    txt.textContent = "idle";
                }
                // refresh sidebar badges live even when version unchanged
                if (S.sessionReady) renderBrandingList();
            }

            /* ---- overlay ---- */
            function openOverlay(c, b, l, p) {
                document.getElementById("overlayImg").src =
                    "/" + c.file + "?v=" + lastVersion;
                document.getElementById("overlayMeta").innerHTML =
                    `<span class="pill">${b}</span><span class="pill">${l}</span><span class="pill">${labelFor(p)}</span>` +
                    (c.width ? `<br>${c.width}×${c.height}px` : "");
                document.getElementById("overlay").style.display = "flex";
            }
            function closeOverlay() {
                document.getElementById("overlay").style.display = "none";
            }
            document.getElementById("overlay").onclick = (e) => {
                if (e.target.id === "overlay") closeOverlay();
            };
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeOverlay();
            });

            /* ---- wiring ---- */
            // Ctrl + mousewheel over the main pane zooms only the screenshot cells (not the whole page).
            let cellZoom = 1;
            const BASE_W = 190,
                BASE_H = 150;
            document.getElementById("main").addEventListener(
                "wheel",
                (e) => {
                    if (!e.ctrlKey) return;
                    e.preventDefault(); // suppress the browser's page zoom
                    cellZoom = Math.min(
                        6,
                        Math.max(0.3, cellZoom * Math.exp(-e.deltaY * 0.0015)),
                    );
                    const m = document.getElementById("main");
                    m.style.setProperty(
                        "--cell-w",
                        Math.round(BASE_W * cellZoom) + "px",
                    );
                    m.style.setProperty(
                        "--cell-h",
                        Math.round(BASE_H * cellZoom) + "px",
                    );
                },
                { passive: false },
            );
            // Save-PDF: server renders the current selection to a PDF (large images for A4/Letter).
            document.getElementById("pdfBtn").onclick = async () => {
                const btn = document.getElementById("pdfBtn");
                const old = btn.textContent;
                btn.disabled = true;
                btn.textContent = "Building…";
                try {
                    const j = await (await fetch("/api/pdf")).json(); // always A4
                    if (j.file)
                        window.open(
                            "/" + j.file + "?t=" + Date.now(),
                            "_blank",
                        );
                    else alert("PDF failed: " + (j.error || "unknown"));
                } catch (e) {
                    alert("PDF failed: " + e.message);
                } finally {
                    btn.disabled = false;
                    btn.textContent = old;
                }
            };
            // Copy Marked -> clipboard as a JSON array of {branding,page,layout}.
            document.getElementById("copyMarkedBtn").onclick = async () => {
                const btn = document.getElementById("copyMarkedBtn");
                const arr = [...marked.values()];
                if (!arr.length) return;
                try {
                    await navigator.clipboard.writeText(
                        JSON.stringify(arr, null, 2),
                    );
                    const old = btn.textContent;
                    btn.textContent = `Copied ${arr.length}`;
                    setTimeout(() => updateMarkUI(), 1200);
                } catch (e) {
                    alert("Copy failed: " + e.message);
                }
            };
            document.getElementById("clearMarkedBtn").onclick = () => {
                marked.clear();
                updateMarkUI();
                renderMain();
            };
            // Refresh -> discard all captured screenshots and rebuild the current selection.
            document.getElementById("refreshBtn").onclick = async () => {
                if (
                    !confirm(
                        "Discard all captured screenshots and rebuild the current selection from scratch?",
                    )
                )
                    return;
                marked.clear();
                updateMarkUI();
                const s = await (
                    await fetch("/api/refresh", { method: "POST" })
                ).json();
                S = s;
                lastVersion = s.version;
                renderAll();
            };
            document.getElementById("search").oninput = (e) => {
                searchText = e.target.value;
                renderBrandingList();
            };
            document.getElementById("selAll").onclick = () => {
                S.model.brandings.forEach((b) => sel.brandings.add(b));
                postSelection();
            };
            document.getElementById("selNone").onclick = () => {
                sel.brandings.clear();
                postSelection();
            };
            document.querySelectorAll("#viewSeg button").forEach(
                (btn) =>
                    (btn.onclick = () => {
                        view = btn.dataset.v;
                        document
                            .querySelectorAll("#viewSeg button")
                            .forEach((x) =>
                                x.classList.toggle("on", x === btn),
                            );
                        renderMain();
                    }),
            );
            // close menus when clicking outside
            document.addEventListener("click", (e) => {
                document.querySelectorAll(".menu[open]").forEach((mn) => {
                    if (!mn.contains(e.target)) mn.removeAttribute("open");
                });
            });

            poll();
        </script>
    </body>
</html>
